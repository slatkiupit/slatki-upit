<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narudžbe — Slatki Upit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#fff8f0;--card:#fff;--blush:#fde6ea;--blush-soft:#fbf5ec;--rose:#d88c9a;--rose-deep:#b96b7b;
    --berry:#8a4a4a;--ink:#5a5050;--muted:#9a8b88;--gold:#d4af37;--line:#f0ddd8;--green:#6f9f7e;--shadow:0 8px 30px rgba(138,74,74,.08);--radius:18px;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',sans-serif;color:var(--ink);line-height:1.5;
    background:radial-gradient(circle at 15% 0%,#fdeef0 0,transparent 40%),radial-gradient(circle at 85% 100%,#fff3e3 0,transparent 40%),var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:22px 16px 60px}
  .head{text-align:center;margin-bottom:18px}
  .head .tag{font-family:'Caveat',cursive;font-size:1.6rem;color:var(--rose);line-height:1}
  .head h1{font-family:'Fraunces',serif;font-size:1.4rem;color:var(--berry);font-weight:600}
  .head .sub{color:var(--muted);font-size:.85rem;margin-top:2px}
  .filters{display:flex;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px;box-shadow:var(--shadow);margin-bottom:18px}
  .filter{flex:1;text-align:center;padding:9px 6px;border-radius:999px;font-weight:600;font-size:.84rem;color:var(--muted);cursor:pointer;transition:.18s;white-space:nowrap}
  .filter.active{background:var(--rose);color:#fff}
  .filter .count{display:inline-block;min-width:18px;padding:0 5px;margin-left:3px;border-radius:999px;background:rgba(0,0,0,.08);font-size:.72rem}
  .filter.active .count{background:rgba(255,255,255,.3)}
  .state{text-align:center;color:var(--muted);padding:40px 20px;font-size:.92rem}
  .order{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;border-left:5px solid var(--line)}
  .order.nova{border-left-color:var(--gold)}.order.odobrena{border-left-color:var(--green)}
  .order.odbijena{border-left-color:#d99}.order.gotova{border-left-color:var(--muted);opacity:.78}
  .o-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
  .o-cake{font-family:'Fraunces',serif;font-weight:600;color:var(--berry);font-size:1.08rem}
  .o-when{font-size:.82rem;color:var(--muted);margin-top:2px}
  .badges{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
  .badge{font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .badge.nova{background:#fdf2dc;color:#a07d2a}.badge.odobrena{background:#e3f0e8;color:var(--green)}
  .badge.odbijena{background:#fbe6e6;color:#b35}.badge.gotova{background:#eee;color:var(--muted)}
  .badge.upit{background:#efe6f5;color:#7a5a95}.badge.fwd{background:#e6eef5;color:#4a6e95}
  .o-img{margin:10px 0;border-radius:12px;overflow:hidden;border:1px solid var(--line);display:block}
  .o-img img{width:100%;display:block;max-height:280px;object-fit:cover}
  .o-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:.86rem;margin:10px 0}
  @media(max-width:430px){.o-grid{grid-template-columns:1fr}}
  .o-grid .k{color:var(--muted)}.o-grid .v{color:var(--ink);font-weight:500}
  .o-note{background:var(--blush-soft);border-radius:10px;padding:8px 12px;font-size:.82rem;color:var(--berry);margin:8px 0}
  .o-price{font-weight:700;color:var(--rose-deep)}
  .o-final{font-weight:700;color:var(--green)}
  .ponuda-box{background:#f6eefa;border:1px dashed #c8a8da;border-radius:12px;padding:12px;margin:10px 0}
  .ponuda-box .lab{font-weight:600;color:#7a5a95;font-size:.82rem;margin-bottom:6px;display:block}
  .ponuda-box input,.ponuda-box textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;font-family:inherit;font-size:.88rem;background:#fff;margin-bottom:8px}
  .ponuda-box textarea{min-height:54px;resize:vertical}
  .ponuda-box input:focus,.ponuda-box textarea:focus{outline:none;border-color:#a87fc0}
  .btn-offer{background:#9b6fb8;color:#fff;width:100%}
  .o-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{padding:10px 16px;border-radius:11px;font-family:inherit;font-weight:600;font-size:.86rem;cursor:pointer;border:none;transition:.15s}
  .btn-ok{background:var(--green);color:#fff;flex:1}.btn-no{background:#fff;color:#b35;border:1.5px solid #f0d0d0}
  .btn-done{background:var(--blush);color:var(--berry);flex:1}
  .btn-call{background:#fff;color:var(--berry);border:1.5px solid var(--line);text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
  .btn-fwd{background:#fff;color:#4a6e95;border:1.5px solid #cfe0f0;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;flex:1}
  .btn:active{transform:scale(.97)}
  .refresh{display:block;margin:0 auto 16px;background:#fff;border:1.5px solid var(--line);color:var(--berry);padding:9px 18px;border-radius:999px;font-family:inherit;font-weight:600;font-size:.85rem;cursor:pointer}
  .refresh:hover{border-color:var(--rose)}
  .overlay{position:fixed;inset:0;background:rgba(90,80,80,.45);backdrop-filter:blur(3px);display:none;place-items:center;padding:20px;z-index:50}
  .overlay.show{display:grid}
  .modal{background:#fff;border-radius:24px;max-width:380px;padding:30px 24px;text-align:center;box-shadow:0 20px 60px rgba(138,74,74,.25)}
  .modal .emoji{font-size:2.6rem}.modal h3{font-family:'Fraunces',serif;color:var(--berry);font-size:1.35rem;margin:8px 0 8px}
  .modal p{color:var(--ink);font-size:.92rem;margin-bottom:18px}
  .m-actions{display:flex;gap:10px}.m-actions .btn{flex:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="tag">Slatki Upit</div>
    <h1>Narudžbe</h1>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:4px">
      <span style="font-size:.82rem;color:var(--berry);font-weight:600" id="userInfo"></span>
      <span id="probaBadge" style="display:none;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;background:#fdf2dc;color:#a07d2a"></span>
      <button onclick="odjava()" style="font-size:.72rem;color:var(--muted);background:none;border:1px solid var(--line);border-radius:999px;padding:3px 10px;cursor:pointer;font-family:inherit">Odjava</button>
    </div>
    <div class="sub" id="sub" style="margin-top:4px">Učitavam…</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <a href="narudzbe.html" style="flex:1;text-align:center;padding:9px;border-radius:12px;font-weight:600;font-size:.84rem;text-decoration:none;background:var(--rose);color:#fff;">📋 Narudžbe</a>
    <a href="kalendar.html" style="flex:1;text-align:center;padding:9px;border-radius:12px;font-weight:600;font-size:.84rem;text-decoration:none;background:#fff;color:var(--muted);border:1.5px solid var(--line);">📅 Kalendar</a>
  </div>
  <div class="filters">
    <div class="filter active" data-f="nova" onclick="setF('nova')">Nove <span class="count" id="c-nova">0</span></div>
    <div class="filter" data-f="odobrena" onclick="setF('odobrena')">Odobrene <span class="count" id="c-odobrena">0</span></div>
    <div class="filter" data-f="gotova" onclick="setF('gotova')">Gotove <span class="count" id="c-gotova">0</span></div>
    <div class="filter" data-f="sve" onclick="setF('sve')">Sve</div>
  </div>
  <button class="refresh" onclick="ucitaj()">↻ Osvježi</button>
  <div id="lista"><div class="state">Učitavam narudžbe…</div></div>
</div>

<div class="overlay" id="fwdModal"><div class="modal">
  <div class="emoji">📦</div>
  <h3>Poslati firmi za dekoraciju?</h3>
  <p>Želite li ovu narudžbu odmah proslijediti firmi <b id="fwdFirma">Topperi</b> (izrada dekoracije)?</p>
  <div class="m-actions">
    <button class="btn btn-no" onclick="finalize(false)">Ne, samo odobri</button>
    <button class="btn btn-ok" onclick="finalize(true)">Da, pošalji</button>
  </div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://mchaukfsckusovutsovr.supabase.co";
const SB_KEY="sb_publishable_NsjGEsOVncc20x11U8Zclw_oFFbnRj7";
const db=supabase.createClient(SB_URL,SB_KEY);
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

/* ── Auth check ── */
let SESSION=null;
(async()=>{
  const{data:{session}}=await db.auth.getSession();
  if(!session){window.location.href='prijava.html';return;}
  SESSION=session;
  const hdr=document.getElementById('userInfo');
  if(hdr){
    const{data:sl}=await db.from('slasticari').select('naziv,proba_do,status').eq('user_id',session.user.id).single();
    if(sl){
      hdr.textContent=sl.naziv;
      const dana=Math.ceil((new Date(sl.proba_do)-new Date())/(1000*60*60*24));
      if(sl.status==='proba'&&dana>0){
        document.getElementById('probaBadge').textContent='Proba: još '+dana+' dana';
        document.getElementById('probaBadge').style.display='inline-block';
      }
    }
  }
  H['Authorization']='Bearer '+session.access_token;
  ucitaj();
})();

/* Firma za izradu dekoracija — promijeni u svoju */
const FIRMA_DEKORACIJE="Topperi";

let SVE=[], filter='nova', fwdId=null;
function setF(f){filter=f;[...document.querySelectorAll('.filter')].forEach(x=>x.classList.toggle('active',x.dataset.f===f));render();}

async function ucitaj(){
  document.getElementById('lista').innerHTML='<div class="state">Učitavam…</div>';
  try{
    const res=await fetch(SB_URL+'/rest/v1/narudzbe?select=*&order=datum_proslave.asc',{headers:H});
    if(!res.ok)throw new Error(await res.text());
    SVE=await res.json();
    document.getElementById('sub').textContent=SVE.length+' narudžbi ukupno';
    brojevi();render();
  }catch(e){document.getElementById('lista').innerHTML='<div class="state">Greška pri učitavanju.<br>'+e.message+'</div>';console.error(e);}
}
function brojevi(){const c=s=>SVE.filter(o=>(o.status||'nova')===s).length;
  document.getElementById('c-nova').textContent=c('nova');
  document.getElementById('c-odobrena').textContent=c('odobrena');
  document.getElementById('c-gotova').textContent=c('gotova');}
function red(k,v){return v?'<div class="k">'+k+'</div><div class="v">'+v+'</div>':'';}
function datumHr(d){if(!d)return '';const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0]+'.';}
function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function kartica(o){
  const st=o.status||'nova';
  const vlastiti = !!o.slika_url;              // kupac učitao svoj dizajn
  const dod=(o.dodatci&&o.dodatci.length)?o.dodatci.join(', '):'';
  const preuzimanje=o.nacin==='dostava'?('Dostava'+(o.adresa?' → '+o.adresa:'')):('Osobno'+(o.termin?' · '+o.termin:''));

  let h='<div class="order '+st+'">';
  h+='<div class="o-top"><div>';
  h+='<div class="o-cake">'+(o.okus||'—')+(o.velicina?' · '+o.velicina:'')+'</div>';
  h+='<div class="o-when">Za: '+datumHr(o.datum_proslave)+(o.prigoda?' · '+o.prigoda:'')+'</div>';
  h+='</div><div class="badges"><span class="badge '+st+'">'+st.toUpperCase()+'</span>';
  if(vlastiti && st==='nova' && !o.cijena_finalna) h+='<span class="badge upit">VLASTITI DIZAJN</span>';
  if(o.proslijedi_dekorater) h+='<span class="badge fwd">ZA '+FIRMA_DEKORACIJE.toUpperCase()+'</span>';
  h+='</div></div>';

  if(o.slika_url) h+='<a class="o-img" href="'+o.slika_url+'" target="_blank"><img src="'+o.slika_url+'" alt="primjer"></a>';

  h+='<div class="o-grid">';
  h+=red('Premaz',o.premaz); h+=red('Dodatci',dod); h+=red('Natpis',o.natpis);
  h+=red('Slavljenik',o.ime_slavljenika?(o.ime_slavljenika+(o.broj_godina?' ('+o.broj_godina+')':'')):'');
  h+=red('Preuzimanje',preuzimanje); h+=red('Kupac',o.kupac_ime);
  h+=red('Okvirno', o.cijena_okvirna?('<span class="o-price">'+o.cijena_okvirna+' €</span>'):'');
  h+=red('Finalna cijena', o.cijena_finalna?('<span class="o-final">'+o.cijena_finalna+' €</span>'):'');
  h+='</div>';
  if(o.alergeni) h+='<div class="o-note">⚠️ '+o.alergeni+'</div>';
  if(o.napomena) h+='<div class="o-note">✍️ '+o.napomena+'</div>';
  if(o.napomena_slasticar) h+='<div class="o-note">💬 Vaša napomena kupcu: '+o.napomena_slasticar+'</div>';

  /* Polje za cijenu — SAMO kod vlastitog dizajna (cijena nije fiksna) */
  if(st==='nova' && vlastiti){
    if(!o.cijena_finalna){
      /* Korak 1 — još nema cijene: upiši i pošalji ponudu */
      h+='<div class="ponuda-box">';
      h+='<span class="lab">Vlastiti dizajn — dogovorite cijenu s kupcem pa je upišite ovdje</span>';
      h+='<input type="number" id="cf-'+o.id+'" placeholder="Finalna cijena €">';
      h+='<textarea id="np-'+o.id+'" placeholder="Napomena kupcu (opcionalno)"></textarea>';
      h+='<button class="btn btn-offer" onclick="spremiPonudu(\''+o.id+'\')">📩 Pošalji ponudu kupcu</button>';
      h+='</div>';
    } else {
      /* Korak 2 — cijena je poslana, čeka se odgovor */
      h+='<div class="o-note" style="background:#f0eaf8;border-left:3px solid #a87fc0">⏳ Ponuda poslana ('+o.cijena_finalna+' €) — čeka se potvrda kupca. Kad kupac potvrdi, kliknite Odobri.</div>';
    }
  }

  h+='<div class="o-actions">';
  if(o.kupac_tel) h+='<a class="btn btn-call" href="tel:'+o.kupac_tel+'">📞 '+o.kupac_tel+'</a>';
  if(st==='nova'){
    /* Odobri se prikazuje: uvijek za obične narudžbe, a za vlastiti dizajn tek nakon što je cijena upisana */
    if(!vlastiti || o.cijena_finalna){
      h+='<button class="btn btn-ok" onclick="openForward(\''+o.id+'\')">✓ Odobri</button>';
    }
    h+='<button class="btn btn-no" onclick="postavi(\''+o.id+'\',\'odbijena\')">Odbij</button>';
  } else if(st==='odobrena'){
    if(o.proslijedi_dekorater) h+='<a class="btn btn-fwd" href="'+mailFirmi(o)+'">✉️ Pošalji firmi '+FIRMA_DEKORACIJE+'</a>';
    h+='<button class="btn btn-done" onclick="postavi(\''+o.id+'\',\'gotova\')">Označi gotovom</button>';
  }
  h+='</div></div>';
  return h;
}
function render(){const l=document.getElementById('lista');let r=SVE;
  if(filter!=='sve') r=SVE.filter(o=>(o.status||'nova')===filter);
  if(!r.length){l.innerHTML='<div class="state">Nema narudžbi u ovoj kategoriji.</div>';return;}
  l.innerHTML=r.map(kartica).join('');}

function mailFirmi(o){
  const tijelo='Narudžba dekoracije:%0D%0A'
    +'Prigoda: '+(o.prigoda||'')+'%0D%0A'
    +'Datum proslave: '+datumHr(o.datum_proslave)+'%0D%0A'
    +'Slavljenik: '+(o.ime_slavljenika||'')+(o.broj_godina?(' ('+o.broj_godina+' god.)'):'')+'%0D%0A'
    +'Natpis: '+(o.natpis||'')+'%0D%0A'
    +'Torta: '+(o.okus||'')+(o.velicina?(' · '+o.velicina):'')+'%0D%0A'
    +(o.slika_url?('Primjer (slika): '+o.slika_url+'%0D%0A'):'')
    +(o.napomena?('Napomena kupca: '+o.napomena+'%0D%0A'):'');
  return 'mailto:?subject='+encodeURIComponent('Narudžba dekoracije — '+FIRMA_DEKORACIJE)+'&body='+tijelo;
}

async function patch(id,polja){
  const res=await fetch(SB_URL+'/rest/v1/narudzbe?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(polja)});
  if(!res.ok)throw new Error(await res.text());
  const o=SVE.find(x=>x.id===id); if(o)Object.assign(o,polja);
}
async function spremiPonudu(id){
  const cf=document.getElementById('cf-'+id).value;
  const np=document.getElementById('np-'+id).value.trim();
  try{await patch(id,{cijena_finalna:cf?parseFloat(cf):null,napomena_slasticar:np||null});render();}
  catch(e){alert('Greška: '+e.message);console.error(e);}
}
/* Odobravanje → skočni prozor za prosljeđivanje firmi */
function openForward(id){fwdId=id;document.getElementById('fwdFirma').textContent=FIRMA_DEKORACIJE;document.getElementById('fwdModal').classList.add('show');}
function closeForward(){document.getElementById('fwdModal').classList.remove('show');fwdId=null;}
async function finalize(send){
  const id=fwdId; if(!id)return;
  const o=SVE.find(x=>x.id===id);
  try{ await patch(id,{status:'odobrena',proslijedi_dekorater:!!send}); }
  catch(e){alert('Greška: '+e.message);console.error(e);return;}
  closeForward(); brojevi(); render();
  if(send && o){ window.location.href=mailFirmi(o); }
}
async function postavi(id,status){try{await patch(id,{status});brojevi();render();}catch(e){alert('Greška: '+e.message);console.error(e);}}


async function odjava(){await db.auth.signOut();window.location.href='prijava.html';}
</script>
</body>
</html>
