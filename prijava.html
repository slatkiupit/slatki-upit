<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prijava — Slatki Upit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#fff8f0;--card:#fff;--blush:#fde6ea;--blush-soft:#fbf5ec;--rose:#d88c9a;--rose-deep:#b96b7b;--berry:#8a4a4a;--ink:#5a5050;--muted:#9a8b88;--line:#f0ddd8;--shadow:0 8px 30px rgba(138,74,74,.08);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',sans-serif;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(circle at 20% 0%,#fdeef0 0,transparent 50%),radial-gradient(circle at 80% 100%,#fff3e3 0,transparent 50%),var(--cream);}
  .box{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:36px 28px;width:100%;max-width:380px}
  .logo{font-family:'Caveat',cursive;font-size:2rem;color:var(--rose);text-align:center;line-height:1}
  .subtitle{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--berry);text-align:center;margin:8px 0 28px;font-weight:500}
  label{display:block;font-weight:600;color:var(--berry);font-size:.88rem;margin-bottom:6px;margin-top:16px}
  input{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-size:.95rem;color:var(--ink);background:#fffdfb;transition:.15s}
  input:focus{outline:none;border-color:var(--rose);background:#fff;box-shadow:0 0 0 3px rgba(216,140,154,.15)}
  .btn{display:block;width:100%;margin-top:24px;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:14px;font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;transition:.15s;box-shadow:0 6px 16px rgba(216,140,154,.35)}
  .btn:hover{background:var(--rose-deep)}.btn:disabled{opacity:.6;cursor:wait}
  .err{color:#c0556a;font-size:.83rem;margin-top:10px;background:#fdeaec;border-radius:10px;padding:10px 12px;display:none}
  .err.show{display:block}
  .link{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted)}
  .link a{color:var(--rose);font-weight:600;text-decoration:none}
  .trial{background:var(--blush-soft);border-radius:12px;padding:12px 14px;font-size:.78rem;color:var(--berry);text-align:center;margin-top:16px;line-height:1.5}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Slatki Upit</div>
  <div class="subtitle">Prijava slastičarke</div>

  <label>E-mail adresa</label>
  <input type="email" id="email" placeholder="vas@mail.com">

  <label>Lozinka</label>
  <input type="password" id="lozinka" placeholder="Vaša lozinka">

  <button class="btn" id="btn" onclick="prijavi()">Prijavi se</button>
  <div class="err" id="err"></div>

  <div class="link">Nemate račun? <a href="registracija.html">Registrirajte se besplatno</a></div>
  <div class="trial">🎁 Prvih <strong>90 dana besplatno</strong> — bez obaveze.</div>
</div>

<script>
const SB_URL="https://mchaukfsckusovutsovr.supabase.co";
const SB_KEY="sb_publishable_NsjGEsOVncc20x11U8Zclw_oFFbnRj7";

const sess=localStorage.getItem('sb_session');
if(sess){try{const s=JSON.parse(sess);if(s&&s.access_token)window.location.href='narudzbe.html';}catch(e){}}

async function prijavi(){
  const email=document.getElementById('email').value.trim();
  const lozinka=document.getElementById('lozinka').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(!email||!lozinka){err.textContent='Unesite e-mail i lozinku.';err.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Prijavljujem...';
  try{
    const res=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:lozinka})
    });
    const data=await res.json();
    if(!res.ok||data.error){
      throw new Error(data.error_description||data.error||data.message||'Pogrešan e-mail ili lozinka.');
    }
    localStorage.setItem('sb_session',JSON.stringify(data));
    window.location.href='narudzbe.html';
  }catch(e){
    btn.disabled=false;btn.textContent='Prijavi se';
    err.textContent=e.message.includes('Invalid')?'Pogrešan e-mail ili lozinka.':'Greška: '+e.message;
    err.classList.add('show');
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')prijavi();});
</script>
</body>
</html>
